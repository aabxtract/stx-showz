services:
  postgres:
    image: postgres:16-alpine
    container_name: veritix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: veritix
      POSTGRES_PASSWORD: veritix
      POSTGRES_DB: veritix
    ports:
      - "5432:5432"
    volumes:
      - veritix_pgdata:/var/lib/postgresql/data

volumes:
  veritix_pgdata:
